<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Practice Arena | Prime Scholars</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #0a0f1d; --gold: #D4AF37; --white: #ffffff; --card-bg: #1c243d; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--dark); color: var(--white);
            overflow: hidden; height: 100%; width: 100%; touch-action: manipulation;
            font-family: 'Segoe UI', sans-serif;
        }

        nav { 
            background: var(--dark); padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); height: 50px;
        }

        /* Menu */
        #menu { padding: 20px; text-align: center; overflow-y: auto; height: calc(100vh - 60px); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px auto; max-width: 500px; }
        .card { background: var(--card-bg); border: 1px solid var(--gold); padding: 20px 10px; border-radius: 15px; cursor: pointer; }
        .card i { font-size: 1.8rem; color: var(--gold); margin-bottom: 8px; }
        .card p { font-size: 0.8rem; margin: 0; font-weight: bold; }

        /* Game Arena - NO SCALING APPLIED HERE */
        #game-arena { display: none; width: 100vw; height: calc(100vh - 50px); background: #000; position: relative; }
        
        /* The iframe now fills the screen naturally */
        iframe { border: none; width: 100%; height: 100%; background: #000; }

        /* Audio Gate Overlay */
        #audio-gate {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 29, 0.98); z-index: 5000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .unlock-btn {
            background: var(--gold); color: var(--dark); border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            font-size: 1rem; cursor: pointer;
        }
        
        .exit-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.2); color: white; border: none;
            padding: 8px 15px; border-radius: 5px; font-size: 0.7rem; z-index: 4000;
        }
    </style>
</head>
<body>

    <nav>
        <span style="color:var(--gold); font-weight:bold;">PRIME SCHOLARS</span>
        <span style="font-size: 0.6rem; color: var(--gold); opacity: 0.5;">NAV: ARENA_NATURAL_SIZE</span>
    </nav>

    <div id="menu">
        <h2 style="color:var(--gold); font-size: 1.2rem;"><i class="fas fa-play"></i> Start Practice</h2>
        <div class="grid">
            <div class="card" onclick="start('math')"><i class="fas fa-calculator"></i><p>Math Main</p></div>
            <div class="card" onclick="start('lower')"><i class="fas fa-plus-circle"></i><p>Lower Primary</p></div>
            <div class="card" onclick="start('pre')"><i class="fas fa-child"></i><p>Preschool</p></div>
            <div class="card" onclick="start('frac')"><i class="fas fa-percent"></i><p>Fractions</p></div>
        </div>
        <p style="font-size: 0.7rem; color: #555; margin-top: 20px;">Section: Home_Selector</p>
    </div>

    <div id="game-arena">
        <div id="audio-gate">
            <button class="unlock-btn" onclick="confirmAudio()">
                <i class="fas fa-volume-up"></i> TAP TO ENABLE SOUND
            </button>
            <p style="margin-top:10px; font-size:0.8rem; color:var(--gold);">Ready to Play!</p>
        </div>
        <button class="exit-btn" onclick="stop()">EXIT</button>
        <iframe id="frame" src="" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const LINKS = {
            'math': 'https://psla-math-game.onrender.com/',
            'lower': 'https://lower-primary-addition-and-subtraction.onrender.com/',
            'pre': 'https://preschool-addition-and-subtraction-game.onrender.com/',
            'frac': 'https://fractions-and-percentages-game.onrender.com/'
        };

        function start(id) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-arena').style.display = 'block';
            document.getElementById('audio-gate').style.display = 'flex';
            const f = document.getElementById('frame');
            f.src = LINKS[id];
        }

        function confirmAudio() {
            document.getElementById('audio-gate').style.display = 'none';
            const f = document.getElementById('frame');
            f.focus();
        }

        function stop() {
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-arena').style.display = 'none';
            document.getElementById('audio-gate').style.display = 'none';
            document.getElementById('frame').src = "";
        }
    </script>
</body>
</html>
