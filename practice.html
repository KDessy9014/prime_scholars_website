<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Practice Arena | Prime Scholars</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #0a0f1d; --gold: #D4AF37; --white: #ffffff; --card-bg: #1c243d; --success: #25D366; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--dark); color: var(--white);
            overflow: hidden; height: 100%; width: 100%; touch-action: none;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Nav Bar */
        nav { 
            background: var(--dark); padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); height: 50px;
        }

        /* Loading Screen - CRITICAL for Render Free Tier */
        #loader {
            position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px);
            background: var(--dark); z-index: 3000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(212, 175, 55, 0.2);
            border-top: 4px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Menu */
        #menu { padding: 20px; text-align: center; overflow-y: auto; height: calc(100vh - 70px); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px auto; max-width: 500px; }
        .card { background: var(--card-bg); border: 1px solid var(--gold); padding: 20px 10px; border-radius: 15px; cursor: pointer; }
        .card i { font-size: 1.8rem; color: var(--gold); margin-bottom: 8px; }
        .card p { font-size: 0.8rem; margin: 0; font-weight: bold; }

        /* Tutor Section */
        .tutor-section {
            margin: 20px auto; max-width: 500px; padding: 15px;
            background: rgba(37, 211, 102, 0.05); border: 1px dashed var(--success);
            border-radius: 12px;
        }
        .tutor-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--success); color: white; padding: 10px 20px;
            border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 0.8rem;
        }

        /* Game Arena - FIXED SCALING */
        #game-arena { display: none; width: 100vw; height: calc(100vh - 50px); background: #000; position: relative; overflow: hidden; }
        .iframe-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        iframe { 
            border: none; width: 1024px; height: 768px; 
            transform-origin: center center; background: #000;
        }

        /* Controls */
        .controls-overlay { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 2000; }
        .action-btn {
            background: var(--gold); color: var(--dark); border: none;
            padding: 10px 22px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <nav>
        <span style="color:var(--gold); font-weight:bold;">PRIME SCHOLARS</span>
        <span style="font-size: 0.6rem; color: var(--gold); opacity: 0.6;">V.FINAL_STABLE</span>
    </nav>

    <div id="loader">
        <div class="spinner"></div>
        <h3 style="color:var(--gold); font-size: 1rem;">Loading Arena...</h3>
        <p style="font-size: 0.7rem; color: #888; text-align: center; padding: 0 20px;">
            Render is waking up the servers.<br>This takes about 45 seconds the first time.
        </p>
    </div>

    <div id="menu">
        <h2 style="color:var(--gold); font-size: 1.2rem;"><i class="fas fa-rocket"></i> Scholar Hub</h2>
        <div class="grid">
            <div class="card" onclick="start('math')"><i class="fas fa-calculator"></i><p>Math Main</p></div>
            <div class="card" onclick="start('lower')"><i class="fas fa-plus-circle"></i><p>Lower Primary</p></div>
            <div class="card" onclick="start('pre')"><i class="fas fa-child"></i><p>Preschool</p></div>
            <div class="card" onclick="start('frac')"><i class="fas fa-percent"></i><p>Fractions</p></div>
        </div>

        <div class="tutor-section">
            <a href="https://wa.me/233209851942?text=I%20need%20help%20with%20math!" target="_blank" class="tutor-btn">
                <i class="fab fa-whatsapp"></i> CONTACT TUTOR
            </a>
        </div>
    </div>

    <div id="game-arena">
        <div class="controls-overlay">
            <button class="action-btn" onclick="stop()"><i class="fas fa-home"></i> EXIT</button>
            <button class="action-btn" onclick="unlockAudio()"><i class="fas fa-volume-up"></i> FIX SOUND</button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="frame" src="" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const LINKS = {
            'math': 'https://psla-math-game.onrender.com/',
            'lower': 'https://lower-primary-addition-and-subtraction.onrender.com/',
            'pre': 'https://preschool-addition-and-subtraction-game.onrender.com/',
            'frac': 'https://fractions-and-percentages-game.onrender.com/'
        };

        function start(id) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';
            const f = document.getElementById('frame');
            f.src = LINKS[id];

            f.onload = () => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('game-arena').style.display = 'block';
                
                // This makes the game large and centered on all mobile screens
                const scale = Math.min(window.innerWidth / 1024, (window.innerHeight - 50) / 768) * 1.15;
                f.style.transform = `scale(${scale})`;
                
                // Interaction focus for keyboard/sound
                f.focus();
            };
        }

        function unlockAudio() {
            const f = document.getElementById('frame');
            f.focus();
            alert("Audio Enabled! Tap the game screen to hear the sound.");
        }

        function stop() {
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-arena').style.display = 'none';
            document.getElementById('loader').style.display = 'none';
            document.getElementById('frame').src = "";
        }
    </script>
</body>
</html>
